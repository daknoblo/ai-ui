version: "2"

run:
  # Ziel-Go-Version für die Analyse fest vorgeben, konsistent zu go.mod.
  go: "1.26"
  timeout: 5m

linters:
  # Standard-Set: errcheck, govet, ineffassign, staticcheck, unused.
  default: standard

issues:
  # Alle Findings melden (Defaults deckeln gleichartige Meldungen bei 3).
  max-issues-per-linter: 0
  max-same-issues: 0
