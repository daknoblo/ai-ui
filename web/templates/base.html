{{define "base"}}<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{.Title}}</title>
	<link rel="stylesheet" href="/static/app.css">
	<script src="/static/htmx.min.js"></script>
	<script src="/static/sse.js"></script>
	<script src="/static/upload.js"></script>
</head>
<body>
	<div class="app">
		{{template "sidebar" .}}
		<main class="main">
			{{block "content" .}}{{end}}
		</main>
	</div>
	{{block "modal" .}}{{end}}
	<script>
		// Nach jedem HTMX-Swap im Nachrichtenbereich nach unten scrollen.
		function scrollMessages() {
			var m = document.getElementById('messages');
			if (m) { m.scrollTop = m.scrollHeight; }
		}
		document.body.addEventListener('htmx:afterSwap', scrollMessages);
		document.body.addEventListener('htmx:sseMessage', scrollMessages);
		window.addEventListener('load', scrollMessages);

		// Web-Suche-Umschalter: Zustand pro Browser merken (localStorage), damit er
		// über Chatwechsel hinweg erhalten bleibt. Der Wert wird beim Senden als
		// Formularfeld "web" übermittelt.
		function webEnabled() {
			return localStorage.getItem('ai-ui-web') === '1';
		}
		function applyWebState(btn) {
			if (!btn) return;
			var on = webEnabled();
			btn.setAttribute('aria-pressed', on ? 'true' : 'false');
			btn.classList.toggle('active', on);
			var form = btn.closest('form');
			if (form) {
				var flag = form.querySelector('#web-flag');
				if (flag) flag.value = on ? '1' : '0';
			}
		}
		function toggleWeb(btn) {
			localStorage.setItem('ai-ui-web', webEnabled() ? '0' : '1');
			applyWebState(btn);
		}
		// Nach dem Absenden (Formular-Reset) den Hidden-Flag-Wert wiederherstellen.
		function syncWebToggle(form) {
			var btn = document.getElementById('web-toggle');
			applyWebState(btn);
		}
		function initWebToggle() {
			applyWebState(document.getElementById('web-toggle'));
		}
		window.addEventListener('load', initWebToggle);
		document.body.addEventListener('htmx:afterSwap', initWebToggle);
	</script>
</body>
</html>
{{end}}
