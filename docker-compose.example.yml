# Beispiel-Stack: zwei ai-ui-Container in EINEM Dockge-Stack, mit Bind-Mounts.
# Kopiere die Datei nach docker-compose.yml oder füge sie in Dockge ein und trage
# die Werte (Keys, Zeitzone) per .env oder direkt je Container in Dockge ein.
#
# Warum die *-init-Dienste? Der App-Container läuft non-root (UID/GID 65532). Bei
# einem Bind-Mount legt der Docker-Daemon das Host-Verzeichnis als root an; der
# non-root-User dürfte dort nicht schreiben (Start bräche mit
# "mkdir /appdata/appdata: permission denied" ab). Jeder *-init-Dienst setzt die
# Rechte einmalig als root und beendet sich; erst danach startet die zugehörige
# App (depends_on: service_completed_successfully). Kein manuelles chown nötig.
#
# Erreichbarkeit: veröffentlichte Ports (ai-ui-1 = 8080, ai-ui-2 = 8081). Für
# Traefik die labels/networks-Blöcke ein- und die ports-Blöcke auskommentieren.

services:
  ai-ui-1:
    image: ghcr.io/daknoblo/ai-ui:latest
    restart: unless-stopped
    depends_on:
      ai-ui-1-init:
        condition: service_completed_successfully
    environment:
      # Secret ausschließlich über Umgebungsvariable (nie in der Konfig-Datei).
      - AZURE_API_KEY=${AZURE_API_KEY}
      # Optional: eigener Key, falls Embeddings auf separater Azure-Ressource liegen.
      - AZURE_EMBEDDING_API_KEY=${AZURE_EMBEDDING_API_KEY:-}
      # Optional: API-Key für die Web-Suche (Tavily/Brave). Für SearXNG nicht nötig.
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - PORT=8080
      - DATA_DIR=/appdata
      # IANA-Zeitzone; das Binary bringt tzdata für Distroless selbst mit.
      - TZ=${TZ:-Europe/Berlin}
      # Intervall der periodischen Verbindungsprüfung (z.B. 30s, 2m; 0/off = aus).
      - HEALTHCHECK_INTERVAL=${HEALTHCHECK_INTERVAL:-60s}
      # Optional: Endpoint-Einstellungen fest per Umgebungsvariable vorgeben.
      # Gesetzte Werte haben Vorrang vor config.json und sind im UI deaktiviert.
      # - AZURE_ENDPOINT=${AZURE_ENDPOINT:-}
      # - AZURE_CHAT_DEPLOYMENT=${AZURE_CHAT_DEPLOYMENT:-}
      # - AZURE_CHAT_MODELS=${AZURE_CHAT_MODELS:-}
      # - AZURE_API_VERSION=${AZURE_API_VERSION:-}
      # - AZURE_EMBEDDING_ENDPOINT=${AZURE_EMBEDDING_ENDPOINT:-}
      # - AZURE_EMBEDDING_DEPLOYMENT=${AZURE_EMBEDDING_DEPLOYMENT:-}
      # - AZURE_EMBEDDING_API_VERSION=${AZURE_EMBEDDING_API_VERSION:-}
    ports:
      - "8080:8080"
    volumes:
      # Persistenter Datenpfad (Bind-Mount): Chats, Dokumente, Embeddings, Konfig.
      - ./ai-ui-1:/appdata
    # ---- Alternative zu ports: Traefik ----
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.ai-ui-1.rule=Host(`chat1.example.com`)"
    #   - "traefik.http.routers.ai-ui-1.entrypoints=websecure"
    #   - "traefik.http.routers.ai-ui-1.tls=true"
    #   - "traefik.http.routers.ai-ui-1.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.ai-ui-1.loadbalancer.server.port=8080"
    # networks:
    #   - traefik

  # Init: setzt einmalig die Rechte des Bind-Mounts (läuft als root, dann Exit).
  ai-ui-1-init:
    image: busybox:1.37
    command: chown -R 65532:65532 /appdata
    user: "0:0"
    restart: "no"
    volumes:
      - ./ai-ui-1:/appdata

  ai-ui-2:
    image: ghcr.io/daknoblo/ai-ui:latest
    restart: unless-stopped
    depends_on:
      ai-ui-2-init:
        condition: service_completed_successfully
    environment:
      - AZURE_API_KEY=${AZURE_API_KEY}
      - AZURE_EMBEDDING_API_KEY=${AZURE_EMBEDDING_API_KEY:-}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - PORT=8080
      - DATA_DIR=/appdata
      - TZ=${TZ:-Europe/Berlin}
      - HEALTHCHECK_INTERVAL=${HEALTHCHECK_INTERVAL:-60s}
      # Optional: Endpoint-Vorgaben wie bei ai-ui-1 (AZURE_ENDPOINT usw.).
    ports:
      - "8081:8080"
    volumes:
      - ./ai-ui-2:/appdata
    # ---- Alternative zu ports: Traefik ----
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.ai-ui-2.rule=Host(`chat2.example.com`)"
    #   - "traefik.http.routers.ai-ui-2.entrypoints=websecure"
    #   - "traefik.http.routers.ai-ui-2.tls=true"
    #   - "traefik.http.routers.ai-ui-2.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.ai-ui-2.loadbalancer.server.port=8080"
    # networks:
    #   - traefik

  ai-ui-2-init:
    image: busybox:1.37
    command: chown -R 65532:65532 /appdata
    user: "0:0"
    restart: "no"
    volumes:
      - ./ai-ui-2:/appdata

# ---- Nur nötig, wenn oben die Traefik-networks eingekommentiert werden ----
# networks:
#   traefik:
#     external: true
