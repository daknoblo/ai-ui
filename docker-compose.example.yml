# Beispiel: EIN ai-ui-Container. Kopiere die Datei nach docker-compose.yml oder
# füge sie in Dockge ein. Das Projekt ist auf genau einen Container ausgelegt;
# wie viele Instanzen du davon startest, ist dir überlassen.
#
# Datenpfad: Der Container läuft als non-root (UID/GID 65532). Ein frisches Named
# Volume übernimmt diese Rechte automatisch aus dem Image und läuft so
# out-of-the-box – auch in Dockge/Portainer als normaler User. (Bind-Mount als
# Alternative samt Rechte-Handling siehe README.)

services:
  ai-ui:
    image: ghcr.io/daknoblo/ai-ui:latest
    container_name: ai-ui
    restart: unless-stopped
    environment:
      # Secret ausschließlich über Umgebungsvariable (nie in der Konfig-Datei).
      - AZURE_API_KEY=${AZURE_API_KEY}
      # Optional: eigener Key, falls Embeddings auf separater Azure-Ressource liegen.
      - AZURE_EMBEDDING_API_KEY=${AZURE_EMBEDDING_API_KEY:-}
      # Optional: API-Key für die Web-Suche (Tavily/Brave). Für SearXNG nicht nötig.
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - PORT=8080
      - DATA_DIR=/appdata
      # IANA-Zeitzone; das Binary bringt tzdata für Distroless selbst mit.
      - TZ=${TZ:-Europe/Berlin}
      # Intervall der periodischen Verbindungsprüfung (z.B. 30s, 2m; 0/off = aus).
      - HEALTHCHECK_INTERVAL=${HEALTHCHECK_INTERVAL:-60s}
      # Optional: Endpoint-Einstellungen fest per Umgebungsvariable vorgeben.
      # Gesetzte Werte haben Vorrang vor config.json und sind im UI deaktiviert.
      # - AZURE_ENDPOINT=${AZURE_ENDPOINT:-}
      # - AZURE_CHAT_DEPLOYMENT=${AZURE_CHAT_DEPLOYMENT:-}
      # - AZURE_CHAT_MODELS=${AZURE_CHAT_MODELS:-}
      # - AZURE_API_VERSION=${AZURE_API_VERSION:-}
      # - AZURE_EMBEDDING_ENDPOINT=${AZURE_EMBEDDING_ENDPOINT:-}
      # - AZURE_EMBEDDING_DEPLOYMENT=${AZURE_EMBEDDING_DEPLOYMENT:-}
      # - AZURE_EMBEDDING_API_VERSION=${AZURE_EMBEDDING_API_VERSION:-}
    ports:
      - "8080:8080"
    volumes:
      # Persistenter Datenpfad: Chats, Dokumente, Embeddings und Konfiguration.
      - ai-ui-data:/appdata
    # ---- Alternative zu ports: Traefik ----
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.ai-ui.rule=Host(`chat.example.com`)"
    #   - "traefik.http.routers.ai-ui.entrypoints=websecure"
    #   - "traefik.http.routers.ai-ui.tls=true"
    #   - "traefik.http.routers.ai-ui.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.ai-ui.loadbalancer.server.port=8080"
    # networks:
    #   - traefik

volumes:
  ai-ui-data:

# ---- Nur nötig, wenn oben die Traefik-networks eingekommentiert werden ----
# networks:
